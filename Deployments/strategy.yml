apiVersion: apps/v1
kind: Deployment
metadata:
  name: ib-deployment
  labels:
    app: bank
spec:
  replicas: 3
  strategy:
    type: Recreate   # Recreate strategy: When updated, Kubernetes deletes all existing pods first, then it creates new pods. This causes temporary downtime.
  selector:
    matchLabels:
      app: bank
  template:
    metadata:
      labels:
        app: bank
    spec:
      containers:
      - name: cont1
        image: prathshingate/bank-app:ib   